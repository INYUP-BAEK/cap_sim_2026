controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPathAckermann", "FollowPathDiff"]

    # ==========================================================
    # 🚛 1. 합체 모드 : 1.45m 휠베이스 거구 최적화
    # ==========================================================
    FollowPathAckermann:
      plugin: "nav2_mppi_controller::MPPIController"

      # 6.4초의 시야 유지 (무거운 카트의 제동/조향 타이밍 확보)
      time_steps: 80
      model_dt: 0.08
      batch_size: 1500

      vx_std: 0.10
      vy_std: 0.0
      # 🚨 [최적화] 부드러운 핸들링을 위해 노이즈 하향
      wz_std: 0.15

      vx_max: 0.18
      vx_min: -0.05
      vy_max: 0.0
      vy_min: 0.0
      # 🚨 [최적화] 긴급 경로 복귀를 위해 조향 한계를 스무더와 함께 상향
      wz_max: 0.35
      wz_min: -0.35

      iteration_count: 1
      prune_distance: 1.0

      transform_tolerance: 0.5
      temperature: 0.35
      gamma: 0.02
      motion_model: "Ackermann"
      visualize: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        # 🚨 [최적화] 저속 조향 데드락 방지. 몸통의 한계 제약을 대폭 완화하여 
        # MPPI가 궤적을 섣불리 삭제(사형)하지 못하게 방어.
        min_turning_r: 0.60

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]

      # 🚨 [최적화] 인플레이션이 걸려있던 크리틱 가중치를 모두 정규화
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.5

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.8

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        # 🚨 [핵심 해결] 직진 똥고집을 꺾어, 경로가 휘면 무조건 감속 후 조향하도록 강제
        cost_weight: 0.5
        threshold_to_consider: 4.0

      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 5.0
        critical_weight: 25.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.25
        near_goal_distance: 0.7

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 4

# 변경 전: 4.0 -> 변경 후: 3.0 (선에 무조건 딱 붙으려는 집착을 약간 내려놓음)
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        offset_from_furthest: 10
        threshold_to_consider: 4.0

      # 변경 전: 3.0 -> 변경 후: 4.0 (대신 차체를 선과 평행하게 정렬하는 것을 최우선으로 삼음)
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        offset_from_furthest: 8
        threshold_to_consider: 2.0
        max_angle_to_prefer: 1.047

    # ==========================================================
    # ✂️ 2. 분리 모드 : 디퍼런셜 주행 (유지 및 동기화)
    # ==========================================================
    FollowPathDiff:
      plugin: "nav2_mppi_controller::MPPIController"
      # [검증] 서버 주기 충돌 방지를 위해 아커만과 동일한 시야 구조로 변경
      time_steps: 80                 
      model_dt: 0.08                 
      batch_size: 1500               
      vx_std: 0.2                    
      vy_std: 0.0                    
      wz_std: 0.6                    
      vx_max: 0.35                   
      vx_min: -0.35
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.0                    
      wz_min: -1.0
      iteration_count: 1
      prune_distance: 1.7            
      transform_tolerance: 0.5 
      temperature: 0.3               
      gamma: 0.015
      motion_model: "DiffDrive"      
      visualize: false              
      
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      AckermannConstraints:
        min_turning_r: 0.0

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: false 
        cost_power: 1
        cost_weight: 1.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 5.0          
        critical_weight: 20.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.20 
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        max_heuristic_delay: 0.1
        trajectory_point_step: 4
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        offset_from_furthest: 20
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_prefer: 0.785

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # [검증] 1.45m 거구에 맞는 주차 여유 공간 (무한 춤추기 방지)
      xy_goal_tolerance: 0.20  
      yaw_goal_tolerance: 0.5  
      
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 100.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["PlannerAckermann", "PlannerDiff"]

    PlannerAckermann:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"

      # 🚨 [핵심 해결] 뇌(플래너)는 몸통(1.15m 한계)보다 여유롭게 그림을 그리도록 1.35m 부여.
      # 이제 코너에서 벗어나도 핸들을 더 꺾어서 복구할 수 있는 "여유 예산"이 생깁니다.
      minimum_turning_radius: 1.35

      reverse_penalty: 8.0
      change_penalty: 4.0

    PlannerDiff:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      use_boundary_cost: true

local_costmap:
  local_costmap: 
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 1.0 
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      
      footprint: '[[-0.45, -0.25], [1.65, -0.25], [1.65, 0.25], [-0.45, 0.25]]'
      footprint_padding: 0.03
      
      plugins: ["stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 8.0      
        min_decay_time: 0.5
        decay_rate: 1.0
        voxel_size: 0.1      
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: true   
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body 
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.5
          max_obstacle_height: 1.0
          clear_after_reading: false

      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 1.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.1
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 2.5            
          min_obstacle_height: -1.5
          max_obstacle_height: 1.5
          v_fov: 1.01
          h_fov: 1.52
          clear_after_reading: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 1.0
      transform_tolerance: 1.0 
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      resolution: 0.05
      track_unknown_space: true
      
      footprint: '[[-0.45, -0.25], [1.65, -0.25], [1.65, 0.25], [-0.45, 0.25]]'
      footprint_padding: 0.03
      
      plugins: ["static_layer", "stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 10.0
        min_decay_time: 1.0
        decay_rate: 0.8
        voxel_size: 0.15
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: false
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: true
          clearing: true
          obstacle_range: 15.0    
          min_obstacle_height: 0.1
          max_obstacle_height: 1.5
          clear_after_reading: false  
          
      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 2.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.15
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 3.0            
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          v_fov: 1.01
          h_fov: 1.52
          clear_after_reading: true

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry 
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_footprint

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odometry

    # 🚨 [검증] MPPI의 wz_max 상향(0.35)에 맞춰 스무더의 리미트 해제
    max_velocity: [0.18, 0.0, 0.35]
    min_velocity: [-0.05, 0.0, -0.35]

    max_accel: [0.18, 0.0, 0.55]
    max_decel: [-0.30, 0.0, -0.65]

smoother_server:
  ros__parameters:
    use_sim_time: false