controller_server:
  ros__parameters:
    use_sim_time: false
    # [이론값 1] model_dt 0.08초와 완벽히 동기화된 주파수
    controller_frequency: 12.5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPathAckermann", "FollowPathDiff"]

    # ==========================================================
    # (MPPI - Ackermann) 베이스라인
    # ==========================================================
    FollowPathAckermann:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 80                 
      model_dt: 0.08                 
      batch_size: 2000               
      
      # [이론값 2] 탐색 노이즈를 속도 한계치에 비례하게 초기화
      vx_std: 0.1                    
      vy_std: 0.0                    
      wz_std: 0.3                   
      
      # [이론값 3] 잭나이프 방지 및 조향 한계
      vx_max: 0.25                
      vx_min: -0.15                    # 🚨 절대 후진 금지 (오직 전진만으로 경로 복구)
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 0.25                   # 🚨 60도 조향 한계 역산값
      wz_min: -0.25
      
      iteration_count: 1
      prune_distance: 2.5            
      transform_tolerance: 0.5 
      temperature: 0.3               
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: false 
      
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      AckermannConstraints:
        # [이론값 4] 60도 한계 기준 최소 반경(1.0m) + 마진
        min_turning_r: 1.1

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.2
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.0            # 전진 전용이므로 가중치 평탄화
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 5.0          
        critical_weight: 20.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.2 
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        max_heuristic_delay: 0.1
        trajectory_point_step: 4
      
      # [이론값 5] 선 따라가기와 각도 맞추기 가중치를 1:1로 동일하게 초기화 (기교 배제)
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0               
        offset_from_furthest: 20
        threshold_to_consider: 0.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 15
        threshold_to_consider: 0.5
        max_angle_to_prefer: 0.785

    # ==========================================================
    # (MPPI-Diff) 에러 방지용 동기화
    # ==========================================================
    FollowPathDiff:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 80                 
      model_dt: 0.08                 
      batch_size: 2000               
      vx_std: 0.2                    
      vy_std: 0.0                    
      wz_std: 0.6                    
      vx_max: 0.35                   
      vx_min: -0.35
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.0                    
      wz_min: -1.0
      iteration_count: 1
      prune_distance: 1.7            
      transform_tolerance: 0.5 
      temperature: 0.3               
      gamma: 0.015
      motion_model: "DiffDrive"      
      visualize: false              
      
      AckermannConstraints:
        min_turning_r: 0.0

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: false
        cost_weight: 1.0
      ObstaclesCritic:
        enabled: true
        repulsion_weight: 5.0          
        critical_weight: 20.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.25 
      PathAlignCritic:
        enabled: true
        cost_weight: 3.0               
      PathFollowCritic:
        enabled: true
        cost_weight: 3.0               
        offset_from_furthest: 20
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20        # 1.45m 로봇에 현실적인 타협점
      yaw_goal_tolerance: 0.5  
      
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 100.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["PlannerAckermann", "PlannerDiff"]

    # 합체 모드용 플래너 (SmacHybrid)
    PlannerAckermann:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP" 
      
      # [이론값 6] 컨트롤러(1.2m)보다 여유를 두어 뇌가 불가능한 명령을 내리지 않게 함
      minimum_turning_radius: 1.3   
      
      change_penalty: 1.0            # 전후진 와리가리 금지
      reverse_penalty: 1.5           # 후진 진입 억제
      cost_penalty: 2.5              # 벽 기피

    PlannerDiff:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      use_boundary_cost: true

local_costmap:
  local_costmap: 
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 2.0 
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 8  
      height: 8
      resolution: 0.05
      footprint: '[[-0.35, -0.215], [1.75, -0.215], [1.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      plugins: ["stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 8.0      
        min_decay_time: 0.5
        decay_rate: 1.0
        voxel_size: 0.1      
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: true   
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body 
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.5
          max_obstacle_height: 1.0
          clear_after_reading: false

      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 1.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.1
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 2.5            
          min_obstacle_height: -1.5
          max_obstacle_height: 1.5
          v_fov: 1.01
          h_fov: 1.52
          clear_after_reading: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 0.8

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 1.0
      transform_tolerance: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      resolution: 0.05
      track_unknown_space: true
      footprint: '[[-0.35, -0.215], [1.75, -0.215], [1.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      plugins: ["static_layer", "stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 10.0
        min_decay_time: 1.0
        decay_rate: 0.8
        voxel_size: 0.15
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: false
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: true
          clearing: true
          obstacle_range: 15.0    
          min_obstacle_height: 0.1
          max_obstacle_height: 1.5
          clear_after_reading: false  
          
      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 2.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.15
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 3.0            
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5
          v_fov: 1.01
          h_fov: 1.52
          clear_after_reading: true

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry 
    # 🚨 중요: 무한 리플래닝을 막은 커스텀 BT 파일 경로 유지!
    default_nav_to_pose_bt_xml: "/home/baek/colcon_ws/src/cap_sim_2026/bt_xml/my_nav_tree.xml"

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_footprint

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odometry
    # 🚨 [수정 1] 사용자가 원래 원했던 0.4 한계치 복구
    max_velocity: [0.25, 0.0, 0.4]     
    # 🚨 [수정 2] 후진 허용 (-0.15)
    min_velocity: [-0.15, 0.0, -0.4]   
    
    # 🚨 [핵심 3] 조향(핸들) 반응 속도 6배 증가! (Z축 0.1 -> 0.6)
    # 코너가 보이면 즉시 앞바퀴를 휙 꺾을 수 있게 만들어 언더스티어를 없앱니다.
    max_accel: [0.15, 0.0, 0.6]      
    max_decel: [-0.3, 0.0, -0.4]