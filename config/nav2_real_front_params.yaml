front:
  amcl:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 1.0
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      alpha5: 0.2
      base_frame_id: "front/base_footprint"
      global_frame_id: "map"
      odom_frame_id: "front/odom"
      scan_topic: "scan"
      map_topic: "/map"
      max_particles: 2000
      min_particles: 500
      set_initial_pose: true
      initial_pose: {x: 4.1, y: -2.9, z: 0.0, yaw: 0.0}

      update_min_d: 0.1
      update_min_a: 0.1

      laser_model_type: "likelihood_field"
      laser_max_range: 8.0 
      laser_likelihood_max_dist: 2.0 
      z_hit: 0.9 
      z_rand: 0.1  

  controller_server:
    ros__parameters:  
      use_sim_time: false
      controller_plugins: ["FollowPath"]
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["general_goal_checker"]
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3

      FollowPath:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
        desired_linear_vel: 0.35
        lookahead_dist: 0.6
        min_lookahead_dist: 0.3
        max_lookahead_dist: 0.9
        lookahead_time: 1.5
        rotate_to_heading_angular_vel: 1.0
        transform_tolerance: 1.0
        use_velocity_scaled_lookahead_dist: false
        min_approach_linear_velocity: 0.05
        use_collision_detection: true
        max_allowed_time_to_collision_up_to_carrot: 1.0
        use_regulated_linear_velocity_scaling: true
        cost_scaling_dist: 0.3
        cost_scaling_gain: 1.0
        inflation_cost_scaling_factor: 3.0

      general_goal_checker:
        stateful: True
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.2
        yaw_goal_tolerance: 0.5

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

  planner_server:
    ros__parameters:
      use_sim_time: false
      expected_planner_frequency: 20.0
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_navfn_planner/NavfnPlanner"
        tolerance: 0.5
        use_astar: false
        allow_unknown: true

  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: false
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: "front/odom"
        robot_base_frame: "front/base_footprint"
        rolling_window: true
        width: 4
        height: 4
        resolution: 0.05
        transform_tolerance: 1.0
        footprint: "[[-0.3, -0.3], [0.3, -0.3], [0.3, 0.3], [-0.3, 0.3]]"
        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          max_obstacle_height: 2.0 
          observation_sources: scan
          scan:
            topic: "/front/scan" 
            
            sensor_frame: "front/laser_link" 
            
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
            clearing: True
            marking: True
            
            inf_is_valid: True
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  global_costmap:
    global_costmap:
      ros__parameters:
        use_sim_time: false
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: "map"
        robot_base_frame: "front/base_footprint"
        resolution: 0.05
        track_unknown_space: true
        transform_tolerance: 1.0
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: "scan"
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
            clearing: True
            marking: True
            inf_is_valid: True
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  map_server:
    ros__parameters:
      use_sim_time: false
      yaml_filename: "/home/baek/colcon_ws/src/cap_sim_2026/maps/parking_map_2d.yaml" #320
      frame_id: "map"

  bt_navigator:
    ros__parameters:
      use_sim_time: false
      global_frame: "map"
      robot_base_frame: "front/base_footprint"
      odom_topic: "odom"
      default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

  behavior_server:
    ros__parameters:
      use_sim_time: false
      global_frame: "front/odom"
      robot_base_frame: "front/base_footprint"

  waypoint_follower:
    ros__parameters:
      use_sim_time: false

  velocity_smoother:
    ros__parameters:
      use_sim_time: false
      odom_topic: "odom"
      max_velocity: [0.4, 0.0, 1.0]
      min_velocity: [-0.3, 0.0, -1.0]

  smoother_server:
    ros__parameters:
      use_sim_time: false