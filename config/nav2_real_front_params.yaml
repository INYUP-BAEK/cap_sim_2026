front:
  amcl:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 1.0
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      alpha5: 0.2
      base_frame_id: "front/base_footprint"
      global_frame_id: "map"
      odom_frame_id: "front/odom"
      scan_topic: "scan"      
      map_topic: "/map"
      max_particles: 2000
      min_particles: 500
      set_initial_pose: true
      initial_pose: {x: 4.1, y: -2.9, z: 0.0, yaw: 0.0}
      update_min_d: 0.1
      update_min_a: 0.1
      laser_model_type: "likelihood_field"
      laser_max_range: 8.0
      laser_likelihood_max_dist: 2.0 
      z_hit: 0.9
      z_rand: 0.1

  controller_server:
    ros__parameters:  
      use_sim_time: false
      controller_plugins: ["FollowPath"]
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["general_goal_checker"]
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3

      # 🧠 제어기 MPPI로 교체 완료 (알아서 장애물 회피 곡선 생성)
      FollowPath:
        plugin: "nav2_mppi_controller::MPPIController"
        time_steps: 50                 
        model_dt: 0.08                 
        batch_size: 2000               
        vx_std: 0.2                    
        vy_std: 0.0                    
        wz_std: 0.6                    
        vx_max: 0.35                   
        vx_min: -0.35
        vy_max: 0.0
        vy_min: 0.0
        wz_max: 1.0                    
        wz_min: -1.0
        iteration_count: 1
        prune_distance: 1.7            
        transform_tolerance: 2.0 
        temperature: 0.3               
        gamma: 0.015
        motion_model: "DiffDrive"      
        visualize: false              
        
        TrajectoryVisualizer:
          trajectory_step: 5
          time_step: 3
          
        AckermannConstraints:
          min_turning_r: 0.0

        critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
        
        ConstraintCritic:
          enabled: true
          cost_power: 1
          cost_weight: 4.0
        GoalCritic:
          enabled: true
          cost_power: 1
          cost_weight: 5.0
          threshold_to_consider: 1.4
        GoalAngleCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0
          threshold_to_consider: 0.5
        PreferForwardCritic:
          enabled: true
          cost_power: 1
          cost_weight: 5.0
          threshold_to_consider: 0.5
        ObstaclesCritic:
          enabled: true
          cost_power: 1
          repulsion_weight: 5.0          
          critical_weight: 20.0
          consider_footprint: true       
          collision_cost: 10000.0        
          collision_margin_distance: 0.20 
          near_goal_distance: 0.5
        PathAlignCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0               
          max_heuristic_delay: 0.1
          trajectory_point_step: 4
        PathFollowCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0               
          offset_from_furthest: 20
          threshold_to_consider: 1.4
        PathAngleCritic:
          enabled: true
          cost_power: 1
          cost_weight: 2.0
          offset_from_furthest: 4
          threshold_to_consider: 0.5
          max_angle_to_prefer: 0.785

      general_goal_checker:
        stateful: False
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.1
        yaw_goal_tolerance: 0.10

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

  planner_server:
    ros__parameters:
      use_sim_time: false
      expected_planner_frequency: 20.0
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_smac_planner/SmacPlanner2D"
        tolerance: 0.5
        allow_unknown: true
        use_boundary_cost: true

  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: false
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: "front/odom"
        robot_base_frame: "front/base_footprint"
        rolling_window: true
        width: 4
        height: 4
        resolution: 0.05
        transform_tolerance: 1.0
        always_send_full_costmap: true  # RViz에서 보이도록 강제 송신
        footprint: "[[-0.3, -0.3], [0.3, -0.3], [0.3, 0.3], [-0.3, 0.3]]"
        plugins: ["obstacle_layer", "inflation_layer"]
        
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: "/front/scan"
            sensor_frame: "front/laser_link"    
            data_type: "LaserScan"
            raytrace_max_range: 4.0             
            raytrace_min_range: 0.0
            obstacle_max_range: 3.5             
            obstacle_min_range: 0.0          
            min_obstacle_height: -0.5
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            inf_is_valid: True
            
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  global_costmap:
    global_costmap:
      ros__parameters:
        use_sim_time: false
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: "map"
        robot_base_frame: "front/base_footprint"
        resolution: 0.05
        track_unknown_space: true
        transform_tolerance: 1.0
        always_send_full_costmap: true
        footprint: "[[-0.3, -0.3], [0.3, -0.3], [0.3, 0.3], [-0.3, 0.3]]"
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
          
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: "/front/scan"
            sensor_frame: "front/laser_link"    
            data_type: "LaserScan"
            raytrace_max_range: 4.0
            raytrace_min_range: 0.0
            obstacle_max_range: 3.5
            obstacle_min_range: 0.0
            min_obstacle_height: -0.5
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            inf_is_valid: True
            
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  map_server:
    ros__parameters:
      use_sim_time: false
      yaml_filename: "/home/inyup/colcon_ws/src/cap_sim_2026/maps/parking_map.yaml"
      frame_id: "map"

  bt_navigator:
    ros__parameters:
      use_sim_time: false
      global_frame: "map"
      robot_base_frame: "front/base_footprint"
      odom_topic: "odom"
      default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

  behavior_server:
    ros__parameters:
      use_sim_time: false
      global_frame: "front/odom"
      robot_base_frame: "front/base_footprint"

  waypoint_follower:
    ros__parameters:
      use_sim_time: false

  velocity_smoother:
    ros__parameters:
      use_sim_time: false
      odom_topic: "odom"
      max_velocity: [0.35, 0.0, 1.0]
      min_velocity: [-0.35, 0.0, -1.0]

  smoother_server:
    ros__parameters:
      use_sim_time: false
