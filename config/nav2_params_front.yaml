front:
  controller_server:
    ros__parameters:
      use_sim_time: true
      controller_plugins: ["FollowPath"]
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["general_goal_checker"]
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3

      FollowPath:
        plugin: "nav2_mppi_controller::MPPIController"
        time_steps: 60
        model_dt: 0.05
        batch_size: 2000
        vx_std: 0.2
        vy_std: 0.0
        wz_std: 0.6
        vx_max: 0.35
        vx_min: 0.0
        vy_max: 0.0
        vy_min: 0.0
        wz_max: 1.0
        wz_min: -1.0
        iteration_count: 1
        prune_distance: 1.7
        transform_tolerance: 0.2
        temperature: 0.3
        gamma: 0.015
        motion_model: "DiffDrive"
        visualize: true
        critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
        ConstraintCritic:
          enabled: true
          cost_power: 1
          cost_weight: 4.0
        GoalCritic:
          enabled: true
          cost_power: 1
          cost_weight: 5.0
          threshold_to_consider: 1.4
        GoalAngleCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0
          threshold_to_consider: 0.5
        PreferForwardCritic:
          enabled: true
          cost_power: 1
          cost_weight: 5.0
          threshold_to_consider: 0.5
        ObstaclesCritic:
          enabled: true
          cost_power: 1
          repulsion_weight: 5.0
          critical_weight: 20.0
          consider_footprint: true
          collision_cost: 10000.0
          collision_margin_distance: 0.25
          near_goal_distance: 0.5
        PathAlignCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0
          max_heuristic_delay: 0.1
          trajectory_point_step: 4
        PathFollowCritic:
          enabled: true
          cost_power: 1
          cost_weight: 3.0
          offset_from_furthest: 20
          threshold_to_consider: 1.4
        PathAngleCritic:
          enabled: true
          cost_power: 1
          cost_weight: 2.0
          offset_from_furthest: 4
          threshold_to_consider: 0.5
          max_angle_to_prefer: 0.785

      general_goal_checker:
        stateful: True
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.2
        yaw_goal_tolerance: 0.5

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

  planner_server:
    ros__parameters:
      use_sim_time: true
      expected_planner_frequency: 20.0
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_smac_planner/SmacPlanner2D"
        tolerance: 0.5
        downsample_costmap: false
        allow_unknown: true
        max_iterations: 1000000
        max_on_approach_iterations: 1000
        max_planning_time: 5.0
        use_boundary_cost: true

  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: true
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: "front/odom"
        robot_base_frame: "front/base_footprint"
        rolling_window: true
        width: 4
        height: 4
        resolution: 0.05
        footprint: "[[-0.3, -0.3], [0.3, -0.3], [0.3, 0.3], [-0.3, 0.3]]"
        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: "scan" # /front/scan으로 자동 변환됨
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
            clearing: True
            marking: True
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  global_costmap:
    global_costmap:
      ros__parameters:
        use_sim_time: true
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: "map"
        robot_base_frame: "front/base_footprint"
        resolution: 0.05
        track_unknown_space: true
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: "scan"
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
            clearing: True
            marking: True
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55

  bt_navigator:
    ros__parameters:
      use_sim_time: true
      global_frame: "map"
      robot_base_frame: "front/base_footprint"
      odom_topic: "odom"

  behavior_server:
    ros__parameters:
      use_sim_time: true
      global_frame: "front/odom"
      robot_base_frame: "front/base_footprint"

  waypoint_follower:
    ros__parameters:
      use_sim_time: true

  velocity_smoother:
    ros__parameters:
      use_sim_time: true
      odom_topic: "odom"
      max_velocity: [0.4, 0.0, 1.0]
      min_velocity: [-0.3, 0.0, -1.0]

  smoother_server:
    ros__parameters:
      use_sim_time: true