slam_toolbox:
  ros__parameters:
    # 1. 시뮬레이터 시간 동기화
    use_sim_time: true

    # 2. 로컬라이제이션 모드 켜기 (솔버 설정 유지)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # 🚨 모드 설정
    mode: localization

    # 🚨 기존 맵 경로 (확장자 없음 유지)
    map_file_name: /home/inyup/colcon_ws/src/cap_sim_2026/maps/hex_robot_map
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true

    # 디퍼런셜 드라이브는 제자리 회전이 잦으므로, 스캔 매칭 주기를 표준으로 설정
    minimum_travel_distance: 0.2   
    minimum_travel_heading: 0.2 

    # 로컬라이제이션이므로 맵 비틀기(루프 클로징) 금지
    do_loop_closing: false

    # 3. TF 뼈대 설정
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    
    # 4. 일반 세팅 (중복 선언된 map_update_interval 정리)
    use_map_saver: false
    map_update_interval: 5.0      # 로컬라이제이션 모드에서는 맵을 자주 퍼블리시할 필요가 없음
    resolution: 0.05
    max_laser_range: 15.0         # 라이다 시야 유지
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000

    # 🚨 [수정 1] 라이다 매칭 탐색 공간 축소 (CPU 절약 및 점프 방지)
    # 아커만 시절처럼 넓게(0.8) 찾을 필요가 없습니다. 
    # 디퍼런셜은 제자리 턴이 정확하므로 좁은 구역(0.5)만 매칭해도 충분합니다.
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.05
    correlation_search_space_smear_deviation: 0.1

    minimum_time_between_scans: 0.1
    use_scan_matching: true
    
    # 🚨 [핵심 수정 2] 오도메트리(바퀴+IMU) 신뢰도 기반 탐색 범위 "축소"
    # 앞서 EKF를 아주 정확하게 맞췄습니다. 라이다가 자기 위치를 찾을 때, 
    # "EKF가 알려준 위치의 아주 가까운 반경" 내에서만 맵과 대조하도록 묶어둡니다.
    # 이렇게 하면 대형 마트의 기둥 같은 반복적인 지형에서 로봇 위치가 확 튀어버리는(Jump) 현상을 막을 수 있습니다.
    odom_match_search_minimum_m: 0.1     # (기존 0.3 -> 0.1) 선형 탐색 오차 허용치 대폭 축소
    odom_match_search_minimum_rad: 0.1   # (기존 0.2 -> 0.1) 회전 탐색 오차 허용치 대폭 축소