front/slam_toolbox:
  ros__parameters:
    # 1. 시스템 및 모드 설정
    use_sim_time: true
    mode: localization
    
    # 🚨 리어봇이 쓰던 맵 경로 그대로 사용 (확장자 .yaml 제외)
    map_file_name: /home/inyup/colcon_ws/src/cap_sim_2026/maps/hex_robot_map
    map_start_pose: [0.5, 0.0, 0.0]  # 리어봇(0,0)보다 2.5m 앞쪽에서 시작한다고 가정
    map_start_at_dock: false

    # 2. 프레임 및 토픽 완벽 격리 (멀티 로봇 필수)
    map_frame: map                       # 글로벌 맵은 공유
    odom_frame: front/odom               # 프론트봇 전용 오돔
    base_frame: front/base_footprint     # 프론트봇 전용 베이스
    scan_topic: /front/scan              # 프론트봇 전용 스캔 토픽

    # 3. 맵 퍼블리시 끄기 (리어봇과의 충돌 방지)
    map_update_interval: 99999.0

    # 4. 디퍼런셜 드라이브 특화: 이동/회전 감지 조건
    # 제자리 회전이 빈번하므로 heading(회전) 감지 조건을 아커만보다 살짝 낮춰 민감하게 반응하도록 함
    minimum_travel_distance: 0.1   
    minimum_travel_heading: 0.1          

    # 5. 오도메트리 vs 라이다 매칭 밸런스 조정
    # 디퍼런셜은 기구학이 직관적이므로 아커만처럼 오돔을 억지로 맹신할 필요 없음. 라이다 매칭을 적극 활용.
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_between_scans: 0.1
    odom_match_search_minimum_m: 0.1     # (아커만 0.3에서 하향)
    odom_match_search_minimum_rad: 0.1   # (아커만 0.2에서 하향)

    # 6. 라이다 센서 설정 (Velodyne, YDLIDAR 등 사양에 맞춰 시야 확보)
    max_laser_range: 15.0
    resolution: 0.05
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    correlation_search_space_dimension: 0.8
    correlation_search_space_resolution: 0.05
    correlation_search_space_smear_deviation: 0.1

    # 7. 최적화 및 그래프 설정 (기존 맵 훼손 방지)
    do_loop_closing: false
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # 8. Ceres Solver 설정 (표준 안정화 값)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None