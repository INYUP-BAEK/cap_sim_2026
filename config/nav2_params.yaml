controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    # 🚨 듀얼 컨트롤러 로드
    controller_plugins: ["FollowPathAckermann", "FollowPathDiff"]

    # ==========================================================
    # 🚗 1. 합체 모드 (프론트+카트+리어) : 아커만 주행 (기존 RPP 유지)
    # ==========================================================
    FollowPathAckermann:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4  
      lookahead_dist: 0.6
      min_lookahead_dist: 0.2
      max_lookahead_dist: 1.2
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.02
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.4
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.15
      use_rotate_to_heading: false  
      allow_reversing: true

    # ==========================================================
    # ✂️ 2. 분리 모드 (리어봇 단독) : 디퍼런셜 주행 (제공해주신 MPPI 이식!)
    # ==========================================================
    FollowPathDiff:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 60                 
      model_dt: 0.05                 
      batch_size: 2000               
      vx_std: 0.2                    
      vy_std: 0.0                    
      wz_std: 0.6                    
      vx_max: 0.35                   
      vx_min: 0.0
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.0                    
      wz_min: -1.0
      iteration_count: 1
      prune_distance: 1.7            
      transform_tolerance: 0.2
      temperature: 0.3               
      gamma: 0.015
      motion_model: "DiffDrive"      
      visualize: true                
      
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      AckermannConstraints:
        min_turning_r: 0.0

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 5.0          
        critical_weight: 20.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.25 
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        max_heuristic_delay: 0.1
        trajectory_point_step: 4
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               
        offset_from_furthest: 20
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_prefer: 0.785

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1   # MPPI 설정값 반영
      yaw_goal_tolerance: 0.5  # MPPI 설정값 반영
      
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: true
    # 🚨 듀얼 플래너 로드
    planner_plugins: ["PlannerAckermann", "PlannerDiff"]

    # 🚗 합체 모드용 플래너 (SmacHybrid)
    PlannerAckermann:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP" 
      minimum_turning_radius: 0.80   
      reverse_penalty: 1.5   
      change_penalty: 0.25   

    # ✂️ 분리 모드용 플래너 (제공해주신 SmacPlanner2D 이식!)
    PlannerDiff:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      use_boundary_cost: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: true
      width: 4  
      height: 4
      resolution: 0.05
      footprint: "[[-0.3, -0.3], [0.85, -0.3], [0.85, 0.3], [-0.3, 0.3]]" # 파이썬 노드에서 덮어씌워짐
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      footprint: "[[-0.3, -0.3], [0.85, -0.3], [0.85, 0.3], [-0.3, 0.3]]" 
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan" 
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered

behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_footprint

waypoint_follower:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odometry/filtered
    # 🚨 리미트는 넉넉하게! 
    # 아커만 0.4m/s, MPPI 0.35m/s 모두 수용할 수 있게 최고/최저 속도 한계점 조율
    max_velocity: [0.4, 0.0, 1.0]
    min_velocity: [-0.3, 0.0, -1.0]

smoother_server:
  ros__parameters:
    use_sim_time: true