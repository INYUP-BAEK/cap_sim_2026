controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["ackermann_goal_checker", "ackermann_cart_goal_checker", "diff_goal_checker", "rear_cart_diff_goal_checker"]
    controller_plugins: ["FollowPathAckermann", "FollowPathDiff", "FollowPathAckermann_cart2", "FollowPathRearCartDiff"]

    # ==========================================================
    # 🏎️ 1. 직결 모드 : 아커만 주행 (0.48m 휠베이스 완전 최적화)
    # ==========================================================
    FollowPathAckermann:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 50                 
      model_dt: 0.08                 
      batch_size: 1600
      
      vx_std: 0.15                    
      vy_std: 0.0                    
      wz_std: 0.7                    
      
      vx_max: 0.25                
      vx_min: -0.15                   
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.2                    
      wz_min: -1.2
      
      iteration_count: 1
      prune_distance: 0.8            
      transform_tolerance: 2.0
      temperature: 0.3               
      gamma: 0.015
      motion_model: "Ackermann"      
      visualize: false 
      
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      AckermannConstraints:
        # [기구학 동기화] 0.48m 휠베이스 물리적 회전 한계
        min_turning_r: 0.25         

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 3.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 10.0          
        critical_weight: 40.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.35 
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 4

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        offset_from_furthest: 10
        threshold_to_consider: 3.0

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 8
        threshold_to_consider: 1.0
        max_angle_to_prefer: 0.785

    # ==========================================================
    # ✂️ 2. 분리 모드 : 디퍼런셜 주행 (DWB 샘플링 제어)
    # ==========================================================
    FollowPathDiff:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      # Small reverse window for overshoot recovery only; keep DWB critics unchanged.
      min_vel_x: -0.05
      min_vel_y: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      max_vel_theta: 0.80
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.25
      acc_lim_x: 0.50
      acc_lim_y: 0.0
      acc_lim_theta: 6.0
      decel_lim_x: -0.50
      decel_lim_y: 0.0
      decel_lim_theta: -6.0
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 25
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.10
      trans_stopped_velocity: 0.08
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 18.0
      PathAlign.forward_point_distance: 0.12
      GoalAlign.scale: 14.0
      GoalAlign.forward_point_distance: 0.12
      PathDist.scale: 24.0
      GoalDist.scale: 22.0
      RotateToGoal.scale: 36.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.oscillation_reset_dist: 0.05
      Oscillation.oscillation_reset_angle: 0.20

    # ==========================================================
    # 3. 리어봇+카트 분리 모드 : 후진 방향 풀링, 곡률 제한 주행
    # ==========================================================
    FollowPathRearCartDiff:
      plugin: "nav2_mppi_controller::MPPIController"

      # Cart is coupled to the front side of the rear robot, so robot -X is the
      # stable travel direction while the cart is being pulled out.
      time_steps: 90
      model_dt: 0.08
      batch_size: 1800
      vx_std: 0.08
      vy_std: 0.0
      wz_std: 0.25
      vx_max: 0.0
      vx_min: -0.12
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 0.35
      wz_min: -0.35
      iteration_count: 1
      prune_distance: 0.8
      transform_tolerance: 1.0
      temperature: 0.35
      gamma: 0.02
      motion_model: "Ackermann"
      visualize: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        min_turning_r: 0.35

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic"]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 1.2
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.4
        threshold_to_consider: 0.8
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 12.0
        critical_weight: 50.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.35
        near_goal_distance: 0.8
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 2
        threshold_to_consider: 0.8
        offset_from_furthest: 6
        max_path_occupancy_ratio: 0.1
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 24.0
        offset_from_furthest: 5
        threshold_to_consider: 0.8
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 5
        threshold_to_consider: 0.8
        max_angle_to_prefer: 1.2
        max_angle_to_furthest: 1.5
        forward_preference: false

    # ==========================================================
    # ✂️ 4. 카트 2개 합체 모드 : 아커만 주행 (1.45m 휠베이스 최적화)
    # ==========================================================
    FollowPathAckermann_cart2:
      plugin: "nav2_mppi_controller::MPPIController"

      # Long ackermann mode uses a rear tracking frame with a far-front steering axis.
      # Bias the optimizer toward smooth forward progress instead of tightly forcing
      # the rear frame onto every local path point.
      time_steps: 80
      model_dt: 0.07
      batch_size: 1800
      vx_std: 0.10
      vy_std: 0.0
      wz_std: 0.34
      vx_max: 0.14
      vx_min: -0.08
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 0.65
      wz_min: -0.65
      iteration_count: 1
      prune_distance: 0.8
      transform_tolerance: 2.0
      temperature: 0.28
      gamma: 0.020
      motion_model: "Ackermann"
      visualize: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        min_turning_r: 0.75

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic", "TwirlingCritic"]

      # 🚨 [최적화] 인플레이션이 걸려있던 크리틱 가중치를 모두 정규화
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.5
        threshold_to_consider: 1.8
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 1.0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 2.0
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.4
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 10.0          
        critical_weight: 40.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.35 
        near_goal_distance: 0.7
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 4
        threshold_to_consider: 1.2
        offset_from_furthest: 10
        max_path_occupancy_ratio: 0.1
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 24.0
        offset_from_furthest: 12
        threshold_to_consider: 2.0
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.5
        offset_from_furthest: 8
        threshold_to_consider: 1.2
        max_angle_to_prefer: 1.0
        max_angle_to_furthest: 1.4


    ackermann_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.50

    ackermann_cart_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 0.70

    diff_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.10

    rear_cart_diff_goal_checker:
      stateful: False
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.50
      
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 100.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["PlannerAckermann", "PlannerDiff", "PlannerRearCartDiff", "PlannerAckermann_cart2"]

    PlannerAckermann:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      lookup_table_size: 10.0
      motion_model_for_search: "REEDS_SHEPP" 
      # [최적화] 컨트롤러(0.40)가 무조건 돌 수 있게 0.45m 마진 설정
      minimum_turning_radius: 0.45   
      reverse_penalty: 6.0   
      change_penalty: 3.0   

    PlannerDiff:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      use_boundary_cost: true

    PlannerRearCartDiff:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      lookup_table_size: 10.0
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.35
      reverse_penalty: 1.0
      change_penalty: 2.0

    PlannerAckermann_cart2:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      lookup_table_size: 10.0
      motion_model_for_search: "REEDS_SHEPP"

      minimum_turning_radius: 0.95
      reverse_penalty: 4.0
      change_penalty: 1.0

local_costmap:
  local_costmap: 
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 1.0 
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 8  
      height: 8
      resolution: 0.05
      
      # 🚨 [최적화] 0.48m 직결 로봇에 맞춘 소형 풋프린트 (X축 1.60 -> 0.75 대폭 축소)
      footprint: '[[-0.35, -0.215], [0.75, -0.215], [0.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      
      plugins: ["stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 8.0      
        min_decay_time: 0.5
        decay_rate: 1.0
        voxel_size: 0.1      
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: false
        combination_method: 1
        observation_sources: "lidar camera_clear"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body 
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.5
          max_obstacle_height: 1.0
          vertical_fov_angle: 0.5236
          horizontal_fov_angle: 6.2832
          decay_acceleration: 5.0
          model_type: 1
          clear_after_reading: false
        camera_clear:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /front/camera/depth/voxel_cloud
          marking: false
          clearing: true
          obstacle_range: 2.5
          min_z: 0.05
          max_z: 2.5
          vertical_fov_angle: 1.01
          horizontal_fov_angle: 1.52
          decay_acceleration: 8.0
          model_type: 0
          clear_after_reading: true

      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 1.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.1
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /rear/camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 2.5            
          min_obstacle_height: -1.5
          max_obstacle_height: 1.5
          min_z: 0.05
          max_z: 2.5
          vertical_fov_angle: 1.01
          horizontal_fov_angle: 1.52
          decay_acceleration: 8.0
          model_type: 0
          clear_after_reading: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      transform_tolerance: 1.0 
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      resolution: 0.05
      track_unknown_space: true
      
      # 🚨 [최적화] 0.48m 직결 로봇에 맞춘 소형 풋프린트
      footprint: '[[-0.35, -0.215], [0.75, -0.215], [0.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: true
          clearing: true
          obstacle_range: 8.0
          raytrace_range: 10.0
          min_obstacle_height: 0.10
          max_obstacle_height: 1.50

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry 
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.60
    min_rotational_vel: 0.40
    rotational_acc_lim: 4.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odometry

    max_velocity: [0.35, 0.0, 1.2]
    min_velocity: [-0.35, 0.0, -1.2]

    max_accel: [0.5, 0.0, 6.0]
    max_decel: [-0.5, 0.0, -6.0]

    smoothing_frequency: 20.0
    feedback: OPEN_LOOP

smoother_server:
  ros__parameters:
    use_sim_time: false
