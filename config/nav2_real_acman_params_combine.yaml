controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPathAckermann", "FollowPathDiff", "FollowPathAckermann_cart2"]

    # ==========================================================
    # 🏎️ 1. 직결 모드 : 아커만 주행 (0.48m 휠베이스 완전 최적화)
    # ==========================================================
    FollowPathAckermann:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 50                 
      model_dt: 0.08                 
      batch_size: 2000               
      
      vx_std: 0.15                    
      vy_std: 0.0                    
      wz_std: 0.7                    
      
      vx_max: 0.25                
      vx_min: -0.15                   
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.2                    
      wz_min: -1.2
      
      iteration_count: 1
      prune_distance: 0.8            
      transform_tolerance: 2.0
      temperature: 0.3               
      gamma: 0.015
      motion_model: "Ackermann"      
      visualize: false 
      
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      AckermannConstraints:
        # [기구학 동기화] 0.48m 휠베이스 물리적 회전 한계
        min_turning_r: 0.25         

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 3.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 10.0          
        critical_weight: 40.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.35 
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 4

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        offset_from_furthest: 10
        threshold_to_consider: 3.0

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 8
        threshold_to_consider: 1.0
        max_angle_to_prefer: 0.785

    # ==========================================================
    # ✂️ 2. 분리 모드 : 디퍼런셜 주행 (경량 RPP 추종)
    # ==========================================================
    FollowPathDiff:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.28
      lookahead_dist: 0.45
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.70
      lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.5
      use_interpolation: true

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.08
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.60
      cost_scaling_dist: 0.35
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 1.0

      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.70
      rotate_to_heading_min_angle: 0.40
      max_angular_accel: 2.5
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

    # ==========================================================
    # ✂️ 3. 카트 2개 합체 모드 : 아커만 주행 (1.45m 휠베이스 최적화)
    # ==========================================================
    FollowPathAckermann_cart2:
      plugin: "nav2_mppi_controller::MPPIController"

      # 6.4초의 시야 유지 (무거운 카트의 제동/조향 타이밍 확보)
      time_steps: 70
      model_dt: 0.07
      batch_size: 1500
      vx_std: 0.08
      vy_std: 0.0
      wz_std: 0.25
      vx_max: 0.18
      vx_min: -0.1
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 0.55
      wz_min: -0.55
      iteration_count: 1
      prune_distance: 1.2
      transform_tolerance: 2.0
      temperature: 0.35
      gamma: 0.02
      motion_model: "Ackermann"
      visualize: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        min_turning_r: 0.90

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]

      # 🚨 [최적화] 인플레이션이 걸려있던 크리틱 가중치를 모두 정규화
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 1.6
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.7
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.5
        threshold_to_consider: 2.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 10.0          
        critical_weight: 40.0
        consider_footprint: true       
        collision_cost: 10000.0        
        collision_margin_distance: 0.35 
        near_goal_distance: 0.7
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0
        max_heuristic_delay: 0.1
        trajectory_point_step: 2
        threshold_to_consider: 0.5
        offset_from_furthest: 8
        max_path_occupancy_ratio: 0.1
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
        offset_from_furthest: 3
        threshold_to_consider: 1.2
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        offset_from_furthest: 3
        threshold_to_consider: 0.5
        max_angle_to_prefer: 0.785
        max_angle_to_furthest: 1.2


    general_goal_checker:
      stateful: False
      plugin: "nav2_controller::SimpleGoalChecker"
      # [최적화] 짧은 로봇 길이에 맞춰 정밀 타격 (10cm 오차 허용)
      xy_goal_tolerance: 0.20  
      yaw_goal_tolerance: 0.5  
      
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 100.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["PlannerAckermann", "PlannerDiff", "PlannerAckermann_cart2"]

    PlannerAckermann:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP" 
      # [최적화] 컨트롤러(0.40)가 무조건 돌 수 있게 0.45m 마진 설정
      minimum_turning_radius: 0.45   
      reverse_penalty: 6.0   
      change_penalty: 3.0   

    PlannerDiff:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      use_boundary_cost: true

    PlannerAckermann_cart2:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"

      minimum_turning_radius: 0.9
      reverse_penalty: 4.0
      change_penalty: 1.0

local_costmap:
  local_costmap: 
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 1.0 
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 8  
      height: 8
      resolution: 0.05
      
      # 🚨 [최적화] 0.48m 직결 로봇에 맞춘 소형 풋프린트 (X축 1.60 -> 0.75 대폭 축소)
      footprint: '[[-0.35, -0.215], [0.75, -0.215], [0.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      
      plugins: ["stvl_lidar_layer", "stvl_camera_layer", "inflation_layer"]
      
      stvl_lidar_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 8.0      
        min_decay_time: 0.5
        decay_rate: 1.0
        voxel_size: 0.1      
        track_unknown_space: true
        max_obstacle_height: 2.5
        origin_z: 0.0
        publish_voxel_map: true   
        combination_method: 1
        observation_sources: "lidar camera_clear"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body 
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.5
          max_obstacle_height: 1.0
          vertical_fov_angle: 0.5236
          horizontal_fov_angle: 6.2832
          decay_acceleration: 5.0
          model_type: 1
          clear_after_reading: false
        camera_clear:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: false
          clearing: true
          obstacle_range: 2.5
          min_z: 0.05
          max_z: 2.5
          vertical_fov_angle: 1.01
          horizontal_fov_angle: 1.52
          decay_acceleration: 8.0
          model_type: 0
          clear_after_reading: true

      stvl_camera_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        max_decay_time: 1.0       
        min_decay_time: 0.1       
        decay_rate: 1.0
        voxel_size: 0.1
        track_unknown_space: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        publish_voxel_map: false  
        combination_method: 1
        observation_sources: "camera"
        camera:
          sensor_frame: base_link
          data_type: PointCloud2
          topic: /camera/depth/voxel_cloud
          marking: true
          clearing: true
          obstacle_range: 2.5            
          min_obstacle_height: -1.5
          max_obstacle_height: 1.5
          min_z: 0.05
          max_z: 2.5
          vertical_fov_angle: 1.01
          horizontal_fov_angle: 1.52
          decay_acceleration: 8.0
          model_type: 0
          clear_after_reading: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 1.0
      transform_tolerance: 1.0 
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      resolution: 0.05
      track_unknown_space: true
      
      # 🚨 [최적화] 0.48m 직결 로봇에 맞춘 소형 풋프린트
      footprint: '[[-0.35, -0.215], [0.75, -0.215], [0.75, 0.215], [-0.35, 0.215]]'
      footprint_padding: 0.02
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          sensor_frame: base_footprint
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: true
          clearing: true
          obstacle_range: 10.0
          raytrace_range: 12.0
          min_obstacle_height: 0.10
          max_obstacle_height: 1.50

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry 
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_footprint

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odometry
    
    # 🚨 [최적화] MPPI 최대 조향 각속도(wz_max: 0.7)와 동기화
    max_velocity: [0.25, 0.0, 1.2]
    min_velocity: [-0.15, 0.0, -1.2] 
    
    max_accel: [0.3, 0.0, 1.0]   
    max_decel: [-0.5, 0.0, -1.0]

    smoothing_frequency: 20.0
    feedback: OPEN_LOOP

smoother_server:
  ros__parameters:
    use_sim_time: false
