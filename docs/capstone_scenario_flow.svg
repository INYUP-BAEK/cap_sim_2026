<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 800 46px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 24px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #374151; }
      .scenario-title { font: 800 32px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #111827; }
      .step-no { font: 800 22px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; }
      .step-title { font: 800 30px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #111827; }
      .step-text { font: 600 22px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #374151; }
      .mode-title { font: 800 26px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #111827; }
      .mode-text { font: 600 19px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #374151; }
      .tag { font: 800 19px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; }
      .note { font: 700 20px "Noto Sans CJK KR", "Noto Sans KR", Arial, sans-serif; fill: #4b5563; }
      .lane1 { fill: #eaf3ff; stroke: #93c5fd; stroke-width: 2; }
      .lane2 { fill: #ecfdf3; stroke: #86efac; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
      .step-blue { fill: #ffffff; stroke: #3b82f6; stroke-width: 3; }
      .step-green { fill: #ffffff; stroke: #22c55e; stroke-width: 3; }
      .step-orange { fill: #ffffff; stroke: #f59e0b; stroke-width: 3; }
      .step-purple { fill: #ffffff; stroke: #8b5cf6; stroke-width: 3; }
      .num-blue { fill: #2563eb; }
      .num-green { fill: #16a34a; }
      .num-orange { fill: #d97706; }
      .num-purple { fill: #7c3aed; }
      .line { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .line-blue { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .line-green { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .line-orange { stroke: #d97706; stroke-width: 4; fill: none; marker-end: url(#arrow-orange); }
    </style>
    <marker id="arrow" markerWidth="15" markerHeight="15" refX="12" refY="7.5" orient="auto">
      <path d="M2,2 L12,7.5 L2,13 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="15" markerHeight="15" refX="12" refY="7.5" orient="auto">
      <path d="M2,2 L12,7.5 L2,13 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="15" markerHeight="15" refX="12" refY="7.5" orient="auto">
      <path d="M2,2 L12,7.5 L2,13 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="15" markerHeight="15" refX="12" refY="7.5" orient="auto">
      <path d="M2,2 L12,7.5 L2,13 Z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text class="title" x="60" y="70">자율 쇼핑카트 수거 로봇 전체 파이프라인</text>
  <text class="subtitle" x="60" y="110">두 로봇의 결합 상태를 바꾸며 Nav2 주행 모드를 전환하고, 카트를 목적지까지 운반</text>

  <!-- Scenario 1 -->
  <rect class="lane1" x="50" y="150" width="1500" height="255" rx="18"/>
  <text class="scenario-title" x="80" y="198">시나리오 1  |  지정 수거장소의 카트 묶음 회수</text>

  <g transform="translate(80,225)">
    <rect class="step-blue" x="0" y="0" width="295" height="130" rx="16"/>
    <circle class="num-blue" cx="35" cy="35" r="22"/>
    <text class="step-no" x="28" y="43">1</text>
    <text class="step-title" x="70" y="43">수거장소 이동</text>
    <text class="step-text" x="30" y="82">직결 Ackermann</text>
    <text class="step-text" x="30" y="112">Nav2 waypoint 주행</text>

    <rect class="step-green" x="365" y="0" width="295" height="130" rx="16"/>
    <circle class="num-green" cx="400" cy="35" r="22"/>
    <text class="step-no" x="393" y="43">2</text>
    <text class="step-title" x="435" y="43">카트 자세 추정</text>
    <text class="step-text" x="395" y="82">로봇 분리</text>
    <text class="step-text" x="395" y="112">ArUco 정밀 인식</text>

    <rect class="step-orange" x="730" y="0" width="295" height="130" rx="16"/>
    <circle class="num-orange" cx="765" cy="35" r="22"/>
    <text class="step-no" x="758" y="43">3</text>
    <text class="step-title" x="800" y="43">앞뒤 동시 결합</text>
    <text class="step-text" x="760" y="82">front / rear 접근</text>
    <text class="step-text" x="760" y="112">카트 묶음 3대 결합</text>

    <rect class="step-purple" x="1095" y="0" width="325" height="130" rx="16"/>
    <circle class="num-purple" cx="1130" cy="35" r="22"/>
    <text class="step-no" x="1123" y="43">4</text>
    <text class="step-title" x="1165" y="43">목적지 복귀</text>
    <text class="step-text" x="1125" y="82">Long Ackermann</text>
    <text class="step-text" x="1125" y="112">카트 묶음 운반</text>

    <path class="line-blue" d="M295,65 H350"/>
    <path class="line-green" d="M660,65 H715"/>
    <path class="line-orange" d="M1025,65 H1080"/>
  </g>

  <!-- Scenario 2 -->
  <rect class="lane2" x="50" y="435" width="1500" height="285" rx="18"/>
  <text class="scenario-title" x="80" y="483">시나리오 2  |  주행 중 발견한 단일 카트 회수</text>

  <g transform="translate(80,510)">
    <rect class="step-blue" x="0" y="0" width="255" height="140" rx="16"/>
    <circle class="num-blue" cx="35" cy="35" r="22"/>
    <text class="step-no" x="28" y="43">1</text>
    <text class="step-title" x="70" y="43">순찰 주행</text>
    <text class="step-text" x="30" y="84">직결 Ackermann</text>
    <text class="step-text" x="30" y="116">waypoint 순회</text>

    <rect class="step-green" x="305" y="0" width="255" height="140" rx="16"/>
    <circle class="num-green" cx="340" cy="35" r="22"/>
    <text class="step-no" x="333" y="43">2</text>
    <text class="step-title" x="375" y="43">카트 발견</text>
    <text class="step-text" x="335" y="84">비전 인식</text>
    <text class="step-text" x="335" y="116">이탈점 이동</text>

    <rect class="step-orange" x="610" y="0" width="255" height="140" rx="16"/>
    <circle class="num-orange" cx="645" cy="35" r="22"/>
    <text class="step-no" x="638" y="43">3</text>
    <text class="step-title" x="680" y="43">rear 선결합</text>
    <text class="step-text" x="640" y="84">카트 손잡이 접근</text>
    <text class="step-text" x="640" y="116">주행공간으로 견인</text>

    <rect class="step-orange" x="915" y="0" width="255" height="140" rx="16"/>
    <circle class="num-orange" cx="950" cy="35" r="22"/>
    <text class="step-no" x="943" y="43">4</text>
    <text class="step-title" x="985" y="43">front 추가 결합</text>
    <text class="step-text" x="945" y="84">카트를 사이에 둔</text>
    <text class="step-text" x="945" y="116">긴 차체 구성</text>

    <rect class="step-purple" x="1220" y="0" width="255" height="140" rx="16"/>
    <circle class="num-purple" cx="1255" cy="35" r="22"/>
    <text class="step-no" x="1248" y="43">5</text>
    <text class="step-title" x="1290" y="43">목적지 복귀</text>
    <text class="step-text" x="1250" y="84">Long Ackermann</text>
    <text class="step-text" x="1250" y="116">단일 카트 운반</text>

    <path class="line-blue" d="M255,70 H290"/>
    <path class="line-green" d="M560,70 H595"/>
    <path class="line-orange" d="M865,70 H900"/>
    <path class="line-orange" d="M1170,70 H1205"/>
  </g>

  <!-- Nav2 summary -->
  <rect class="panel" x="50" y="755" width="1500" height="105" rx="18"/>
  <text class="mode-title" x="80" y="795">Nav2 주행 모드 전환</text>

  <g transform="translate(315,770)">
    <rect x="0" y="0" width="245" height="56" rx="14" fill="#eaf3ff" stroke="#3b82f6" stroke-width="2"/>
    <text class="mode-text" x="24" y="35">직결 Ackermann</text>

    <path class="line" d="M255,28 H300"/>

    <rect x="310" y="0" width="245" height="56" rx="14" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text class="mode-text" x="350" y="35">분리 Differential</text>

    <path class="line" d="M565,28 H610"/>

    <rect x="620" y="0" width="265" height="56" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text class="mode-text" x="647" y="35">rear+cart Differential</text>

    <path class="line" d="M895,28 H940"/>

    <rect x="950" y="0" width="245" height="56" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <text class="mode-text" x="982" y="35">Long Ackermann</text>
  </g>

  <text class="note" x="80" y="882">발표 포인트: 카트 위치를 아는 경우는 양쪽 동시 결합, 모르는 경우는 rear가 먼저 끌어낸 뒤 front가 결합한다.</text>
</svg>
